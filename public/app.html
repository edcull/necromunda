<!DOCTYPE html>
<!-- Necromunda Dominion Campaign Map — interactive underhive sector tracker -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dominion Campaign Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070a09; --hive:#0d1311; --panel:#111a17; --panel-2:#16211d;
    --tox:#5fd9a0; --tox-bright:#8effc4; --tox-dim:rgba(95,217,160,.16);
    --amber:#e8a23d; --ember:#ff6b1a;
    --text:#cdd8d2; --muted:#7e8f88; --faint:#566660;
    --edge:rgba(125,255,191,.16); --edge-soft:rgba(125,255,191,.08);
    --grey:#6c7a74; --ink:#e6efe9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--void); color:var(--text);
    font-family:'Rajdhani',system-ui,sans-serif; font-size:15px;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  h1,h2,h3,.disp{font-family:'Oswald',system-ui,sans-serif;font-weight:600;letter-spacing:.04em}
  button{font-family:inherit;color:inherit;cursor:pointer}
  ::selection{background:var(--tox);color:#04110a}

  .wrap{max-width:1480px;margin:0 auto;padding:18px 20px 48px}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px}
  .brand .sector{font-family:'Oswald';font-weight:700;font-size:clamp(20px,3.2vw,32px);
    letter-spacing:.06em;color:#eef6f1;line-height:1;text-transform:uppercase;text-shadow:0 0 18px rgba(95,217,160,.25)}
  .brand .campaign{font-family:'Rajdhani';font-weight:600;font-size:12px;letter-spacing:.42em;
    text-transform:uppercase;color:var(--tox);margin-top:6px;opacity:.85}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .save-tag{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);min-width:64px;text-align:right;transition:color .3s}
  .save-tag.on{color:var(--tox)}
  .btn{background:var(--panel);border:1px solid var(--edge);color:var(--text);padding:9px 15px;font-size:12px;
    letter-spacing:.14em;text-transform:uppercase;font-weight:600;border-radius:2px;transition:.15s}
  .btn:hover{border-color:var(--tox);color:var(--tox-bright);background:var(--panel-2)}
  .btn.ghost{background:transparent}
  .btn.warn:hover{border-color:var(--ember);color:#ffb27a}

  /* ---------- HUD frame ---------- */
  .frame{position:relative;border:1px solid var(--edge);background:var(--hive);
    box-shadow:inset 0 0 90px rgba(0,0,0,.7), inset 0 0 1px rgba(125,255,191,.4), 0 0 0 4px rgba(95,217,160,.03);padding:7px}
  .frame::before{content:"";position:absolute;inset:5px;border:1px solid var(--edge-soft);pointer-events:none;z-index:6}
  .corner{position:absolute;width:26px;height:26px;border:2px solid var(--tox);opacity:.65;pointer-events:none;z-index:7}
  .corner.tl{top:-1px;left:-1px;border-right:0;border-bottom:0}
  .corner.tr{top:-1px;right:-1px;border-left:0;border-bottom:0}
  .corner.bl{bottom:-1px;left:-1px;border-right:0;border-top:0}
  .corner.br{bottom:-1px;right:-1px;border-left:0;border-top:0}

  /* ---------- pan layer (wraps SVG + nodes) ---------- */
  #panLayer{position:absolute;inset:0}

  /* ---------- stage / underhive ---------- */
  .stage{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;
    background:
      radial-gradient(42% 52% at 84% 82%, rgba(255,120,40,.20), transparent 60%),
      radial-gradient(34% 46% at 16% 78%, rgba(255,110,30,.12), transparent 62%),
      radial-gradient(40% 40% at 62% 16%, rgba(120,150,150,.10), transparent 66%),
      radial-gradient(60% 70% at 40% 38%, rgba(34,52,48,.34), transparent 74%),
      linear-gradient(180deg,#0c100e 0%,#0a0d0b 54%,#06090700 100%),#070a08;}
  .stage .deck{position:absolute;inset:0;opacity:.14;pointer-events:none;
    background-image:linear-gradient(rgba(125,255,191,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(125,255,191,.045) 1px,transparent 1px);
    background-size:46px 46px;
    -webkit-mask:radial-gradient(120% 120% at 50% 42%,#000 38%,transparent 100%);mask:radial-gradient(120% 120% at 50% 42%,#000 38%,transparent 100%)}
  svg.hivemap{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
  .vig{position:absolute;inset:0;pointer-events:none;z-index:2;
    box-shadow:inset 0 0 120px 18px rgba(2,4,3,.62), inset 0 0 360px 60px rgba(2,4,3,.34)}

  /* hive map elements */
  .dome{fill:none;stroke:rgba(95,217,160,.07);stroke-width:1.3}
  .dome-spoke{stroke:rgba(95,217,160,.045);stroke-width:1}
  .blk{fill:rgba(120,150,135,.05);stroke:rgba(120,150,135,.08);stroke-width:.7}
  .blk.w{fill:rgba(180,140,90,.05);stroke:rgba(180,140,90,.08)}
  .pipe{fill:none;stroke:rgba(170,190,180,.07);stroke-width:5;stroke-linecap:round}
  .pipe-i{fill:none;stroke:rgba(10,16,14,.5);stroke-width:2.4}
  .pipe-flow{fill:none;stroke:rgba(95,217,160,.16);stroke-width:1.4;stroke-dasharray:3 13;stroke-linecap:round;animation:flow 5s linear infinite}
  .walk-u{stroke:rgba(0,0,0,.32);stroke-width:5;fill:none;stroke-linecap:round}
  .walk{stroke:rgba(150,172,160,.16);stroke-width:2.2;fill:none;stroke-linecap:round}
  .walk-c{stroke:rgba(125,255,191,.10);stroke-width:1;stroke-dasharray:2 5;fill:none}
  @keyframes flow{to{stroke-dashoffset:-32}}

  /* ---------- zone modules ---------- */
  #nodes{position:absolute;inset:0;z-index:4}
  .place-overlay{position:absolute;inset:0;z-index:8;cursor:crosshair;display:none}
  .place-overlay.show{display:block}
  .place-hint{position:absolute;left:50%;top:16px;transform:translateX(-50%);pointer-events:none;
    background:rgba(6,11,9,.92);border:1px solid var(--tox);color:var(--tox-bright);
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:8px 14px;border-radius:3px;white-space:nowrap;box-shadow:0 6px 22px rgba(0,0,0,.55)}
  .place-hint .cancel{pointer-events:auto;margin-left:12px;color:var(--muted);text-decoration:underline;cursor:pointer}
  .place-hint .cancel:hover{color:#ffb27a}
  .locrow{display:flex;gap:8px}
  .locbtn{flex:1;background:#16211d;border:1px solid var(--edge);color:var(--text);padding:9px 10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;border-radius:2px;cursor:pointer}
  .locbtn:hover{border-color:var(--tox);color:var(--tox-bright)}
  .locbtn.ghost{flex:0 0 auto}
  .node{position:absolute;transform:translate(-50%,-50%);z-index:4;display:flex;flex-direction:column;align-items:center;gap:6px;background:none;border:0;padding:0;touch-action:none}
  .module{--c:var(--grey);position:relative;display:grid;place-items:center;border:1.5px solid var(--c);
    background:rgba(8,13,11,.8);border-radius:9px;transition:box-shadow .18s, transform .18s;cursor:grab;
    box-shadow:0 0 0 1px rgba(0,0,0,.55), 0 0 16px -3px var(--c), inset 0 0 14px rgba(0,0,0,.45)}
  .module::before{content:"";position:absolute;inset:-17px;border-radius:50%;z-index:-1;pointer-events:none;
    background:radial-gradient(circle, rgba(7,12,10,.78) 44%, rgba(7,12,10,0) 74%)}
  .node.hideout .module::before{inset:-21px}
  .node.dragging{z-index:9}
  .node.dragging .module{cursor:grabbing;transform:scale(1.06);box-shadow:0 0 0 1px rgba(0,0,0,.6), 0 0 28px 2px var(--c), inset 0 0 14px rgba(0,0,0,.45)}
  .node.territory .module{width:54px;height:54px}
  .node.hideout .module{width:62px;height:62px;border-width:2px;border-radius:50% 50% 10px 10px}
  .node.hideout .module::after{content:"";position:absolute;inset:-5px;border:1px solid var(--c);opacity:.3;border-radius:50% 50% 12px 12px}
  .node:hover .module{transform:scale(1.07);box-shadow:0 0 0 1px rgba(0,0,0,.55), 0 0 24px 0 var(--c), inset 0 0 14px rgba(0,0,0,.45)}
  .node.selected .module{outline:1px dashed var(--tox-bright);outline-offset:4px}

  .terricon{width:32px;height:32px;color:var(--ink);display:block}
  .node.hideout .module{font-size:28px;line-height:1}
  .gicon{font-size:28px;line-height:1}
  .node.uncontrolled .module{--ink:#9fb0a8}
  .node.empty .module{border-style:dashed;border-color:rgba(120,142,132,.42);background:rgba(8,13,11,.45);box-shadow:inset 0 0 12px rgba(0,0,0,.4)}
  .node.empty:hover .module{border-color:var(--tox);box-shadow:0 0 16px -4px var(--tox)}
  .plus{font-size:24px;font-weight:300;color:rgba(150,172,160,.55)}

  .tag{position:absolute;top:-9px;left:50%;transform:translateX(-50%);font-size:7px;letter-spacing:.16em;font-weight:700;
    background:var(--c,var(--tox));color:#06120c;padding:1px 6px;border-radius:1px;text-transform:uppercase;white-space:nowrap}
  .lbl{--c:var(--grey);background:rgba(6,11,9,.85);border:1px solid var(--c);padding:2px 7px;text-align:center;border-radius:2px;max-width:124px}
  .lbl .name{display:block;font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#e8f2ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;line-height:1.3}
  .lbl .sub{display:block;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.3}
  .lbl .sub.owner{color:var(--c)}

  .legend{position:absolute;left:14px;bottom:14px;z-index:5;background:rgba(6,11,9,.74);border:1px solid var(--edge);
    backdrop-filter:blur(2px);padding:9px 12px 10px;border-radius:2px;max-width:212px}
  .legend-toggle{display:none}
  .legend-body{}
  .legend h3{font-size:10px;letter-spacing:.24em;color:var(--tox);text-transform:uppercase;margin:0 0 7px}
  .legend ul{list-style:none;margin:0;padding:0;display:grid;gap:3px}
  .legend li{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.05em;color:var(--text);text-transform:uppercase}
  .legend .swatch{width:13px;height:13px;border-radius:2px;display:grid;place-items:center;font-size:9px;border:1px solid rgba(0,0,0,.5);flex:0 0 auto}
  .legend .ct{margin-left:auto;color:rgba(95,217,160,.85);font-size:10px;font-variant-numeric:tabular-nums}
  .legend .ct-rep{color:rgba(232,162,61,.85);font-size:10px;font-variant-numeric:tabular-nums;min-width:18px;text-align:right}
  .legend .ct-rat{color:rgba(95,217,160,.85);font-size:10px;font-variant-numeric:tabular-nums;min-width:24px;text-align:right}
  .legend-sort{display:flex;gap:4px;margin-bottom:8px;width:100%} .legend-sort button{flex:1}
  .legend-sort button{background:transparent;border:1px solid rgba(95,217,160,.15);color:rgba(95,217,160,.3);font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:2px 6px;border-radius:2px;font-family:'Rajdhani';transition:.15s}
  #sortTerr{border-color:rgba(95,217,160,.15);color:rgba(95,217,160,.3)} #sortTerr.on{border-color:var(--tox);color:var(--tox)}
  #sortRep{border-color:rgba(232,162,61,.15);color:rgba(232,162,61,.3)} #sortRep.on{border-color:var(--amber);color:var(--amber)}
  #sortRat{border-color:rgba(95,217,160,.15);color:rgba(95,217,160,.3)} #sortRat.on{border-color:var(--tox-bright);color:var(--tox-bright)}
  .hint{position:absolute;right:14px;bottom:14px;z-index:5;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}

  /* ---------- drawer ---------- */
  .scrim{position:fixed;inset:0;background:rgba(2,5,4,.55);backdrop-filter:blur(2px);z-index:40;opacity:0;visibility:hidden;transition:.2s}
  .scrim.show{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(392px,92vw);z-index:50;
    background:linear-gradient(180deg,var(--panel) 0%,#0c1311 100%);border-left:1px solid var(--edge);
    box-shadow:-20px 0 60px rgba(0,0,0,.6);transform:translateX(102%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--edge)}
  .dhead .kicker{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--tox)}
  .dhead h2{margin:4px 0 0;font-size:19px;text-transform:uppercase;color:#eef6f1}
  .x{background:transparent;border:1px solid var(--edge);width:30px;height:30px;border-radius:2px;font-size:16px;line-height:1;color:var(--muted)}
  .x:hover{border-color:var(--ember);color:#ffb27a}
  .dbody{padding:18px 20px;overflow-y:auto;flex:1}
  .field{margin-bottom:16px}
  .field > label{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  select,input[type=text],input[type=password]{width:100%;background:var(--void);border:1px solid var(--edge);color:var(--text);padding:10px 11px;
    font-family:'Rajdhani';font-size:15px;font-weight:500;border-radius:2px}
  select:focus,input:focus{outline:none;border-color:var(--tox);box-shadow:0 0 0 2px var(--tox-dim)}
  select option{background:#0a100e}

  .terrcard{border:1px solid var(--edge);border-radius:2px;background:rgba(0,0,0,.25);padding:14px;margin-top:4px}
  .ct-top{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .ct-top .tile{--c:var(--tox);width:46px;height:46px;flex:0 0 auto;display:grid;place-items:center;border:1px solid var(--edge);border-radius:8px;background:rgba(0,0,0,.3)}
  .ct-top .tile .terricon{width:30px;height:30px;color:var(--ink)}
  .tname{font-family:'Oswald';font-size:18px;text-transform:uppercase;color:#eef6f1;line-height:1.05}
  .tmeta{display:flex;gap:7px;margin-top:4px;align-items:center;flex-wrap:wrap}
  .pill{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:1px;border:1px solid var(--edge);color:var(--muted)}
  .pill.card{color:#0a100e;background:var(--tox);border-color:var(--tox)}
  .pill.card.red{background:#e0626a;border-color:#e0626a}
  .pill.house{color:var(--amber);border-color:rgba(232,162,61,.4)}
  .flavor{font-style:italic;color:var(--muted);font-size:13.5px;line-height:1.5;margin:8px 0 12px}
  .boon{margin-top:10px}
  .boon h4{margin:0 0 4px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--tox)}
  .boon.enh h4{color:var(--amber)}
  .boon p{margin:0;font-size:13.5px;line-height:1.55;color:var(--text)}
  .boonlist{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
  .boonlist li{display:flex;gap:9px;align-items:flex-start}
  .boonlist li::before{content:"";flex:0 0 auto;width:5px;height:5px;margin-top:7px;border-radius:50%;background:var(--tox);opacity:.85}
  .boon.enh .boonlist li::before{background:var(--amber)}
  .boonlist .btag{flex:0 0 auto;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--tox);background:var(--tox-dim);border:1px solid var(--edge);border-radius:2px;padding:2px 6px;margin-top:1px}
  .boon.enh .boonlist .btag{color:var(--amber);background:rgba(240,150,42,.12);border-color:rgba(240,150,42,.3)}
  .boonlist .btxt{font-size:13px;line-height:1.5;color:var(--text)}
  .empty-note{color:var(--faint);font-size:13px;line-height:1.5;font-style:italic;padding:6px 0}
  .ownerline{display:flex;align-items:center;gap:9px;margin-top:10px;padding:9px 11px;border:1px solid var(--edge);border-radius:2px;background:rgba(0,0,0,.2)}
  .ownerline .dot{width:16px;height:16px;border-radius:3px;display:grid;place-items:center;font-size:11px;flex:0 0 auto}
  .ownerline .who{font-size:13px;letter-spacing:.06em;text-transform:uppercase}

  /* ---------- modal ---------- */
  .modal{position:fixed;inset:0;z-index:60;display:grid;place-items:center;padding:20px;opacity:0;visibility:hidden;transition:.2s}
  .modal.show{opacity:1;visibility:visible}
  .sheet{width:min(680px,100%);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;
    background:linear-gradient(180deg,var(--panel) 0%,#0b110f 100%);border:1px solid var(--edge);border-radius:3px;
    box-shadow:0 30px 80px rgba(0,0,0,.6);transform:translateY(10px) scale(.99);transition:.2s}
  .modal.show .sheet{transform:none}
  .mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--edge)}
  .mhead .kicker{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--tox)}
  .mhead h2{margin:3px 0 0;font-size:20px;text-transform:uppercase;color:#eef6f1}
  .mbody{padding:18px 22px;overflow-y:auto}
  .setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;margin-bottom:20px}
  .player-seg{display:flex;gap:6px;flex-wrap:wrap}
  .player-seg button{flex:1;min-width:42px;background:#121a17;border:1px solid var(--edge);color:var(--text);
    padding:9px 0;font-weight:700;font-size:14px;border-radius:3px;cursor:pointer;letter-spacing:.04em}
  .player-seg button:hover{border-color:var(--tox)}
  .player-seg button.on{background:var(--tox);border-color:var(--tox);color:#04140d;box-shadow:0 0 14px -2px var(--tox)}
  .terr-head{display:flex;justify-content:space-between;align-items:baseline;margin:20px 0 10px}
  .terr-count{font-size:11px;letter-spacing:.1em;color:var(--muted)}
  .terr-count.over{color:#ff9a5a}
  .terr-pool{display:flex;gap:12px;padding:4px 2px 2px;flex-wrap:wrap}
  .terr-col{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
  .terr-colhead{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--tox);padding:2px 2px 4px;position:sticky;top:0;background:var(--panel);z-index:1}
  .terr-chip{display:flex;align-items:center;gap:9px;padding:7px 9px;border:1px solid var(--edge);border-radius:3px;cursor:pointer;background:#101714;transition:.12s}
  .terr-chip:hover{border-color:var(--tox-dim)}
  .terr-chip.on{border-color:var(--tox);background:#13211b}
  .terr-chip .box{width:15px;height:15px;border:1px solid var(--muted);border-radius:2px;display:grid;place-items:center;font-size:11px;color:#04140d;flex:0 0 auto}
  .terr-chip.on .box{background:var(--tox);border-color:var(--tox)}
  .terr-chip .tn{font-size:12px;color:var(--text);line-height:1.15}
  .terr-chip .tc{font-size:10px;color:var(--muted)}
  @media(max-width:560px){.setup-grid{grid-template-columns:1fr}}
  .lbl-sm{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .gang-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--edge-soft);border-radius:2px;margin-bottom:9px;background:rgba(0,0,0,.18)}
  .gang-row .num{font-size:11px;color:var(--faint);width:14px;text-align:center;font-variant-numeric:tabular-nums}
  .swatch-pick{position:relative;width:34px;height:34px;flex:0 0 auto}
  .swatch-pick input[type=color]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;border:0}
  .swatch-pick .face{position:absolute;inset:0;border-radius:3px;border:1px solid rgba(0,0,0,.5);display:grid;place-items:center;font-size:15px;pointer-events:none;box-shadow:0 0 10px -3px var(--c)}
  .icon-cell{position:relative}
  .icon-cell input{width:46px;text-align:center;font-size:17px;padding:8px 4px}
  .gang-row .nm{flex:0 0 auto;min-width:80px}
  .gang-type-cell{flex:1} .gang-type-cell select{width:100%;font-family:'Rajdhani';font-size:13px;background:var(--void);border:1px solid var(--edge);color:var(--text);padding:8px 10px;border-radius:2px}
  .stat-cell{flex:0 0 auto} .stat-cell input{width:60px;font-family:'Rajdhani';font-size:13px;background:var(--void);border:1px solid var(--edge);color:var(--text);padding:8px 6px;border-radius:2px;text-align:center}
  .gang-type-tag{font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--tox);padding:4px 0}
  .hideout-stats{display:flex;gap:10px;margin-bottom:14px}
  .hstat{flex:1;background:rgba(0,0,0,.25);border:1px solid var(--edge-soft);border-radius:2px;padding:8px 10px}
  .hstat-label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .hstat-val{display:block;font-size:18px;font-family:'Oswald';font-weight:600;letter-spacing:.04em}
  .hstat-rep{color:var(--amber)} .hstat-rat{color:var(--tox)}
  .terr-held{margin:6px 0 0;display:grid;gap:6px}

      let o=circ(x,y,Math.max(rx,ry)*1.15,{fill:'url(#toxGlow)'});
      o+=path(blob(x,y,rx,ry,.24),{fill:'#123026','fill-opacity':.92,stroke:'rgba(95,220,140,.20)','stroke-width':2});
      o+=path(blob(x,y,rx*0.66,ry*0.66,.3),{fill:'#1b4632','fill-opacity':.7});
      o+=path(blob(x,y,rx*0.36,ry*0.36,.34),{fill:'none',stroke:'rgba(130,245,170,.22)','stroke-width':1.3});
      for(let i=0;i<11;i++){const a=rng()*6.283,rr=Math.sqrt(rng())*0.85; o+=circ(x+Math.cos(a)*rx*rr,y+Math.sin(a)*ry*rr,ri(1.4,3.6),{fill:'rgba(140,245,175,.14)'});}
      return o;
    }
    function factory(x,y,s,bright){
      bright=bright||0;
      const slabOp=(0.7+0.24*bright).toFixed(2);
      let o=rect(x-s*0.72,y-s*0.5,s*1.44,s*1.0,{fill:'#171b16','fill-opacity':slabOp,stroke:SHAD,'stroke-width':1});
      if(bright>0.12) o+=rect(x-s*0.72,y-s*0.5,s*1.44,s*1.0,{fill:'#5a2a18','fill-opacity':(bright*0.2).toFixed(2)});
      const lo=bright>0.45, b1=lo?'#2e342a':'#23271f', b2=lo?'#3a2c1d':'#2a2017';
      const nb=4+Math.floor(rng()*4);
      for(let i=0;i<nb;i++){const bx=x+ri(-s*0.6,s*0.45),by=y+ri(-s*0.42,s*0.4),bw=ri(s*0.16,s*0.5),bh=ri(s*0.2,s*0.55);
        o+=rect(bx,by,bw,bh,{fill:rng()<.5?b1:b2,'fill-opacity':(0.85+0.15*bright).toFixed(2),stroke:SHAD,'stroke-width':1});
        if(rng()<.45) o+=line(bx,by,bx+bw,by+bh,{stroke:'rgba(0,0,0,.4)','stroke-width':1.2}); }
      for(let i=0;i<1+Math.floor(rng()*2);i++){const cx2=x+ri(-s*0.5,s*0.5),ch=ri(s*0.6,s*1.15),cw=ri(5,9);
        o+=rect(cx2,y-ch,cw,ch,{fill:lo?'#2c2014':'#241a12',stroke:SHAD,'stroke-width':1})+rect(cx2-1,y-ch-3,cw+2,4,{fill:'#2c2118'}); }
      if(rng()<.7){const tx=x+ri(-s*0.4,s*0.4),ty=y+ri(-s*0.05,s*0.4),tr=ri(s*0.12,s*0.22);
        o+=circ(tx,ty,tr,{fill:'#1c1812',stroke:'rgba(120,135,120,.12)','stroke-width':1.4})+circ(tx,ty,tr*0.6,{fill:'none',stroke:'rgba(120,135,120,.10)','stroke-width':1}); }
      for(let i=0;i<3;i++){const px=x+ri(-s*0.6,s*0.6),py=y+ri(-s*0.3,s*0.5);
        o+=path(`M${px.toFixed(1)} ${py.toFixed(1)} q ${ri(-22,22).toFixed(1)} ${ri(-18,4).toFixed(1)} ${ri(-32,32).toFixed(1)} ${ri(-4,18).toFixed(1)}`,{fill:'none',stroke:'rgba(95,72,50,.4)','stroke-width':ri(2,4)}); }
      for(let i=0;i<9;i++) o+=rect(x+ri(-s*0.75,s*0.75),y+ri(-s*0.5,s*0.55),ri(2,5),ri(2,5),{fill:'rgba(125,112,88,.12)'});
      return o;
    }
    // local density of the factory sprawl (denser clusters glow warmer & read brighter)
    const fabDens=FAB_SITES.map((p,i)=>{ let c=0; FAB_SITES.forEach((q,j)=>{ if(i!==j&&Math.hypot(p[0]-q[0],p[1]-q[1])<150) c++; }); return c; });
    const fabMax=Math.max(1,...fabDens);
    // red-brown aura pooling over the densest factory zones (drawn under the factories)
    let fabGlow=''; FAB_SITES.forEach((p,i)=>{ const t=fabDens[i]/fabMax; if(t>0.18){ fabGlow+=circ(p[0],p[1],70+t*150,{fill:'url(#fabGlow)','fill-opacity':(0.12+t*0.5).toFixed(2)}); } });
    out.push(fabGlow);
    // factories — a cluster at every site, brighter where the sprawl is dense (+ satellites)
    let messFab=''; FAB_SITES.forEach(([x,y],i)=>{ const t=fabDens[i]/fabMax; messFab+=factory(x,y,ri(32,64),t);
      const sat=Math.floor(rng()*2)+(rng()<.4?1:0);
      for(let k=0;k<sat;k++){ const a=rng()*6.283,rr=ri(40,72); messFab+=factory(x+Math.cos(a)*rr,y+Math.sin(a)*rr,ri(20,38),t*0.7); } });
    // sumps — tucked into open gaps; evenly spread across the map with a little clustering
    const fabFar=(x,y,d)=>FAB_SITES.every(s=>Math.hypot(s[0]-x,s[1]-y)>d);
    const gaps=[]; for(let gx=92;gx<W;gx+=84){ for(let gy=132;gy<H-42;gy+=84){ const x=gx+ri(-34,34),y=gy+ri(-34,34); if(!inDome(x,y,1.04)&&fabFar(x,y,64)&&!nearLeg(x,y,130)) gaps.push([x,y]); } }
    let sumpC=[];
    if(gaps.length){
      // even base via farthest-point
      const md=gaps.map(g=>1e18); let cur=gaps[0]; sumpC.push(cur);
      const baseN=Math.min(7,gaps.length);
      while(sumpC.length<baseN){ let bi=0,bd=-1; for(let j=0;j<gaps.length;j++){ const dd=Math.hypot(gaps[j][0]-cur[0],gaps[j][1]-cur[1]); if(dd<md[j])md[j]=dd; if(md[j]>bd){bd=md[j];bi=j;} } cur=gaps[bi]; sumpC.push(cur); }
      // a few clusters: place near an existing sump
      let added=0,tries=0;
      while(added<3 && tries<160){ tries++; const base=sumpC[Math.floor(rng()*baseN)];
        const cand=gaps.filter(g=>{ const dB=Math.hypot(g[0]-base[0],g[1]-base[1]); return dB>=96&&dB<=190 && sumpC.every(s=>Math.hypot(s[0]-g[0],s[1]-g[1])>=90); });
        if(cand.length){ sumpC.push(cand[Math.floor(rng()*cand.length)]); added++; } }
    }
    let messSump=''; sumpC.forEach(([x,y])=> messSump+=sump(x,y,ri(50,120),ri(38,80)));
    // toxic rivulets linking nearby sumps
    let chan=''; sumpC.forEach((p,i)=>{ let bj=-1,bd=1e9; sumpC.forEach((q,j)=>{ if(j!==i){const dd=Math.hypot(p[0]-q[0],p[1]-q[1]); if(dd<bd&&dd<300){bd=dd;bj=j;}} }); if(bj>i){ const q=sumpC[bj],mx=(p[0]+q[0])/2+ri(-30,30),my=(p[1]+q[1])/2+ri(-30,30),d=`M${p[0].toFixed(1)} ${p[1].toFixed(1)} Q${mx.toFixed(1)} ${my.toFixed(1)} ${q[0].toFixed(1)} ${q[1].toFixed(1)}`; chan+=path(d,{fill:'none',stroke:'rgba(95,210,140,.12)','stroke-width':3})+path(d,{fill:'none',stroke:'rgba(140,245,175,.10)','stroke-width':1}); } });
    out.push(chan); out.push(messSump);
    // dense hab / junk sprawl through the warrens
    let junk=''; for(let i=0;i<900;i++){ const x=rng()*W,y=ri(120,H-26); if(inDome(x,y,0.98))continue;
      const w=ri(2.5,8),h=ri(2.5,8),rot=ri(0,90); junk+=rect(x,y,w,h,{fill:rng()<.5?'rgba(150,140,118,.07)':'rgba(120,150,130,.06)',transform:`rotate(${rot.toFixed(0)} ${(x+w/2).toFixed(1)} ${(y+h/2).toFixed(1)})`}); }
    out.push(junk);
    // rubble / debris scattered through the gaps
    let rub=''; for(let i=0;i<1480;i++){ const x=rng()*W,y=ri(120,H-26); if(inDome(x,y,0.97))continue;
      if(rng()<0.12) rub+=line(x,y,x+ri(-7,7),y+ri(-5,5),{stroke:'rgba(110,98,76,.12)','stroke-width':1});
      else rub+=rect(x,y,ri(2,5),ri(2,5),{fill:rng()<.10?'rgba(120,240,160,.09)':'rgba(120,110,88,.08)',transform:`rotate(${(ri(0,90)).toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})`}); }
    out.push(rub);
    out.push(messFab);

    // 3. POPULATED DOMES (districts) with the holdings ring road
    DISTRICTS.forEach((d,di)=>{
      const cx=d.cx,cy=d.cy,r=d.r,cid='dome'+di;
      domeDefs+=`<clipPath id="${cid}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath>`;
      out.push(circ(cx,cy,r,{fill:'#101713','fill-opacity':.92,stroke:'rgba(130,150,135,.14)','stroke-width':2}));
      out.push(circ(cx,cy,r*1.02,{fill:'url(#domeGlow)'}));
      let g='';
      g+=circ(cx,cy,r*0.40,{fill:'none',stroke:'rgba(130,150,135,.09)','stroke-width':1.2});
      g+=circ(cx,cy,r*0.95,{fill:'none',stroke:'rgba(130,150,135,.08)','stroke-width':1.2});
      const spokes=7+Math.floor(rng()*4);
      for(let s=0;s<spokes;s++){const a=s/spokes*6.283+rng()*0.2; g+=line(cx,cy,cx+Math.cos(a)*r,cy+Math.sin(a)*r,{stroke:'rgba(130,150,135,.07)','stroke-width':1});}
      const nb=Math.floor(r*r/108);
      for(let b=0;b<nb;b++){const a=rng()*6.283,rr=Math.sqrt(rng())*r*0.95,x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr,w=ri(3,8),h=ri(3,8),rot=ri(0,90),lit=rng()<0.09;
        g+=rect(x-w/2,y-h/2,w,h,{fill:lit?'rgba(255,160,80,.24)':(rng()<.5?'rgba(160,178,160,.08)':'rgba(130,150,130,.06)'),transform:`rotate(${rot.toFixed(0)} ${x.toFixed(1)} ${y.toFixed(1)})`});}
      out.push(`<g clip-path="url(#${cid})">${g}</g>`);
      // the holdings ring road (where territories sit) — a touch brighter
      out.push(circ(cx,cy,r*RING_FRAC,{fill:'none',stroke:'rgba(120,210,170,.16)','stroke-width':1.6}));
      out.push(circ(cx,cy,r*RING_FRAC,{fill:'none',stroke:'rgba(120,210,170,.06)','stroke-width':5}));
      // (seating pads drawn from the actual holding positions, after this loop)
      out.push(path(`M${cx-r} ${cy} A${r} ${r} 0 0 1 ${cx+r} ${cy}`,{fill:'none',stroke:'rgba(190,205,195,.06)','stroke-width':2}));
    });
    // seating pads under every holding at its real position (covers relocated factory holdings)
    LAYOUT.forEach(n=>{ const o=(typeof state!=='undefined'&&state&&state.pos&&state.pos[n.id]); const x=(o?o.x:n.x)*16, y=(o?o.y:n.y)*9;
      if(n.type==='hideout') out.push(circ(x,y,30,{fill:'url(#domeGlow)'})+circ(x,y,14,{fill:'rgba(8,14,11,.5)',stroke:'rgba(130,150,135,.13)','stroke-width':1}));
      else out.push(circ(x,y,13,{fill:'rgba(8,14,11,.45)',stroke:'rgba(120,210,170,.14)','stroke-width':1})); });

    // 4. arterial conduits linking districts + pipe network through factory sprawl
    const dc=DISTRICTS.map(d=>[d.cx,d.cy]);
    function artery(x0,y0,x1,y1,w){ const mx=(x0+x1)/2+ri(-44,44),my=(y0+y1)/2+ri(-34,34);
      const d=`M${x0.toFixed(1)} ${y0.toFixed(1)} Q${mx.toFixed(1)} ${my.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)}`;
      const bw=w||4.3;
      return path(d,{fill:'none',stroke:'rgba(0,0,0,.45)','stroke-width':bw+3.7})+path(d,{fill:'none',stroke:'url(#artGrad)','stroke-width':bw,'stroke-opacity':.71,'stroke-linecap':'round'})+path(d,{fill:'none',stroke:'rgba(220,200,170,.05)','stroke-width':1.2}); }
    let art='';
    // trunk network linking the domes — each to its two nearest neighbours
    const aedges=new Set();
    dc.forEach((p,i)=>{ dc.map((q,j)=>({j,d:(q[0]-p[0])**2+(q[1]-p[1])**2})).filter(o=>o.j!==i).sort((a,b)=>a.d-b.d).slice(0,2)
      .forEach(o=>aedges.add(Math.min(i,o.j)+'-'+Math.max(i,o.j))); });
    aedges.forEach(k=>{ const [a,b]=k.split('-').map(Number); art+=artery(dc[a][0],dc[a][1],dc[b][0],dc[b][1],4.6); });
    art+=artery(-20,300,1620,360,4.6);
    // finer pipe network weaving through the factory sprawl (each site to its nearest)
    FAB_SITES.forEach((p,i)=>{ let bj=-1,bd=1e9; FAB_SITES.forEach((q,j)=>{ if(j!==i){const dd=Math.hypot(p[0]-q[0],p[1]-q[1]); if(dd<bd&&dd<150){bd=dd;bj=j;}} }); if(bj>i){ art+=artery(p[0],p[1],FAB_SITES[bj][0],FAB_SITES[bj][1],2.4); } });
    // junctions at dome cores and fab sites
    dc.forEach(([x,y])=>{ art+=circ(x,y,6.5,{fill:'#201710',stroke:'rgba(165,135,97,.17)','stroke-width':1.3})+circ(x,y,3,{fill:'rgba(170,140,100,.1)'}); });
    FAB_SITES.forEach(([x,y])=>{ art+=circ(x,y,3,{fill:'#1b130c',stroke:'rgba(150,120,84,.14)','stroke-width':1}); });
    out.push(art);

    // 5. transit rails
    ['M-20 470 C400 440 900 520 1620 470','M250 920 C320 600 560 360 720 -20'].forEach(d=>{
      out.push(path(d,{fill:'none',stroke:'rgba(95,140,150,.09)','stroke-width':3}));
      out.push(path(d,{fill:'none',stroke:'rgba(102,217,185,.13)','stroke-width':1,'stroke-dasharray':'1 10'}));
    });

    // 6. supply routes between holdings (green logistics network)
    const {pts,edges}=nnEdges(); let road='';
    edges.forEach(([a,b])=>{ const p=pts[a],q=pts[b];
      road+=line(p.x,p.y,q.x,q.y,{stroke:'rgba(105,180,145,.17)','stroke-width':2.6})+line(p.x,p.y,q.x,q.y,{stroke:'rgba(138,255,196,.28)','stroke-width':1.15,'stroke-dasharray':'3 6'}); });
    out.push(road);

    // 7. sector grid + coordinate graticule
    let grid='';
    for(let x=0;x<=W;x+=100) grid+=line(x,0,x,H,{stroke:'rgba(125,255,191,.04)','stroke-width':1});
    for(let y=0;y<=H;y+=100) grid+=line(0,y,W,y,{stroke:'rgba(125,255,191,.04)','stroke-width':1});
    for(let x=0;x<=W;x+=400) grid+=line(x,0,x,H,{stroke:'rgba(125,255,191,.09)','stroke-width':1});
    for(let y=0;y<=H;y+=400) grid+=line(0,y,W,y,{stroke:'rgba(125,255,191,.09)','stroke-width':1});
    const tick={fill:'rgba(125,255,191,.30)','font-family':'monospace','font-size':'11'};
    let ci=0; for(let x=100;x<W;x+=200) grid+=txt(x+3,16,String(++ci).padStart(2,'0'),tick);
    let ro=0; const rl='ABCDEFGH'; for(let y=120;y<H;y+=200) grid+=txt(6,y,rl[ro++]||'',tick);
    out.push(grid);

    // 8. scale bar (top-left) + compass (top-right)
    const mile=266.7, sbx=78, sby=58, seg=mile/4;
    let sb=rect(sbx-8,sby-30,mile+18,34,{fill:'rgba(6,11,9,.55)',stroke:'rgba(95,217,160,.22)','stroke-width':1,rx:2});
    for(let i=0;i<4;i++) sb+=rect(sbx+i*seg,sby-6,seg,5,{fill:i%2?'rgba(95,217,160,0)':'rgba(95,217,160,.45)',stroke:'rgba(95,217,160,.45)','stroke-width':1});
    sb+=txt(sbx-2,sby-9,'0',{fill:'rgba(95,217,160,.6)','font-family':'monospace','font-size':'10'});
    sb+=txt(sbx+mile-3,sby-9,'1',{fill:'rgba(95,217,160,.6)','font-family':'monospace','font-size':'10'});
    sb+=txt(sbx+mile+9,sby+0,'MILE',{fill:'rgba(95,217,160,.55)','font-family':'monospace','font-size':'10','letter-spacing':'1'});
    sb+=txt(sbx-4,sby-19,'SECTOR SPAN \u2248 6 MILES',{fill:'rgba(95,217,160,.42)','font-family':'monospace','font-size':'9','letter-spacing':'2'});
    out.push(sb);
    const ox=1532,oy=72;
    let cp=circ(ox,oy,22,{fill:'rgba(6,11,9,.5)',stroke:'rgba(95,217,160,.3)','stroke-width':1});
    cp+=path(`M${ox} ${oy-16} L${ox-5} ${oy+4} L${ox} ${oy} L${ox+5} ${oy+4} Z`,{fill:'rgba(95,217,160,.55)'});
    cp+=path(`M${ox} ${oy+16} L${ox-5} ${oy-4} L${ox} ${oy} L${ox+5} ${oy-4} Z`,{fill:'rgba(95,217,160,.18)'});
    cp+=txt(ox-3.5,oy-25,'N',{fill:'rgba(95,217,160,.6)','font-family':'monospace','font-size':'11'});
    out.push(cp);

    const defs=`<defs>
      <linearGradient id="mapcool" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0e1614" stop-opacity=".4"/><stop offset="1" stop-color="#060907" stop-opacity="0"/></linearGradient>
      <linearGradient id="mapwarm" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a0f08" stop-opacity="0"/><stop offset="1" stop-color="#1d1008" stop-opacity=".45"/></linearGradient>
      <linearGradient id="artGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#52341f"/><stop offset=".5" stop-color="#7a4e2e"/><stop offset="1" stop-color="#3a2415"/></linearGradient>
      <radialGradient id="toxGlow"><stop offset="0" stop-color="rgba(90,235,150,.18)"/><stop offset="1" stop-color="rgba(90,235,150,0)"/></radialGradient>
      <radialGradient id="fabGlow"><stop offset="0" stop-color="rgba(150,52,26,.5)"/><stop offset=".45" stop-color="rgba(120,46,24,.28)"/><stop offset="1" stop-color="rgba(110,40,22,0)"/></radialGradient>
      <radialGradient id="domeGlow"><stop offset="0" stop-color="rgba(255,170,90,.05)"/><stop offset=".7" stop-color="rgba(255,170,90,.02)"/><stop offset="1" stop-color="rgba(255,170,90,0)"/></radialGradient>
      ${domeDefs}
    </defs>`;
    document.getElementById('hivemap').innerHTML = defs + out.join('');
  }

  /* ============ RENDER NODES ============ */
  const nodesWrap=document.getElementById('nodes');
  function nodePos(n){ const p=state.pos&&state.pos[n.id]; return (p&&isFinite(p.x))?{x:p.x,y:p.y}:{x:n.x,y:n.y}; }
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  // drag-to-reposition (with click fallback to open the editor)
  function attachDrag(btn,id){
    let active=false, moved=false, sx=0, sy=0, ox=0, oy=0;
    function down(e){
      if(!isArbitrator){ openEditor(id); return; }
      if(e.pointerType==='mouse' && e.button!==0) return;
      active=true; moved=false; sx=e.clientX; sy=e.clientY;
      const cur=nodePos(LBI[id]); ox=cur.x; oy=cur.y;
      btn.classList.add('dragging');
      try{ btn.setPointerCapture(e.pointerId); }catch(_){}
      btn.addEventListener('pointermove',move);
      btn.addEventListener('pointerup',up);
      btn.addEventListener('pointercancel',up);
      e.preventDefault(); e.stopPropagation();
    }
    function move(e){
      if(!active) return;
      const r=nodesWrap.getBoundingClientRect();
      if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4) moved=true;
      if(!moved) return;
      const nx=clamp(ox+(e.clientX-sx)/r.width*100, 2.5, 97.5);
      const ny=clamp(oy+(e.clientY-sy)/r.height*100, 4, 95.5);
      btn.style.left=nx+'%'; btn.style.top=ny+'%';
      state.pos=state.pos||{}; state.pos[id]={x:+nx.toFixed(2),y:+ny.toFixed(2)};
    }
    function up(e){
      if(!active) return; active=false;
      btn.classList.remove('dragging');
      btn.removeEventListener('pointermove',move);
      btn.removeEventListener('pointerup',up);
      btn.removeEventListener('pointercancel',up);
      try{ btn.releasePointerCapture(e.pointerId); }catch(_){}
      if(moved){ scheduleSave(); buildHive(); } else { openEditor(id); }
    }
    btn.addEventListener('pointerdown',down);
  }

  function render(){
    document.getElementById('sectorName').textContent=state.sector;
    document.getElementById('campaignName').textContent=state.campaign;
    nodesWrap.innerHTML='';
    LAYOUT.forEach(n=>{
      const data=state.nodes[n.id];
      const btn=el('button','node '+n.type);
      const p=nodePos(n);
      btn.style.left=p.x+'%'; btn.style.top=p.y+'%'; btn.dataset.id=n.id;
      if(n.id===selectedId) btn.classList.add('selected');
      const owner=gangOf(data.gang);
      const c=owner?owner.color:NEUTRAL;
      const mod=el('div','module'); mod.style.setProperty('--c',c);
      let name='',sub='';

      if(n.type==='hideout'){
        const g=el('div','gicon', owner?owner.icon:'⌖'); mod.appendChild(g);
        const tag=el('div','tag','Hideout'); tag.style.setProperty('--c',c); tag.style.color='#e8f2ec'; mod.appendChild(tag);
        name=owner?owner.name:'Unclaimed'; sub=owner&&owner.type?owner.type:'Hideout';
        if(!owner) btn.classList.add('uncontrolled');
      }else{
        const t=data.terr?TERR_BY_KEY[data.terr]:null;
        if(!t){ btn.classList.add('empty'); mod.appendChild(el('div','plus','+')); name='Empty Plot'; sub='Tap to develop'; }
        else { mod.innerHTML=svgIcon(t.key); name=t.name; sub=owner?owner.name:'Uncontrolled'; }
        if(!owner) btn.classList.add('uncontrolled');
      }

      const lbl=el('div','lbl'); lbl.style.setProperty('--c',c);
      lbl.appendChild(el('span','name',name));
      const sb=el('span','sub'+(owner?' owner':''),sub); sb.style.setProperty('--c',c);
      if(owner) sb.style.color='#e8f2ec';
      lbl.appendChild(sb);

      btn.appendChild(mod); btn.appendChild(lbl);
      attachDrag(btn,n.id);
      nodesWrap.appendChild(btn);
    });
    renderLegend();
    const fn=document.getElementById('footnote'); if(fn){ const N=state.players; fn.textContent=`${4*N} holdings · ${N} hideouts · ${3*N} territory plots`; }
  }
  let legendSort='terr';
  function renderLegend(){
    const ul=document.getElementById('legendList'); ul.innerHTML='';
    const rows=state.gangs.slice(0,state.players).map((g,i)=>({g,i,n:countHoldings(i),rep:Number(g.rep)||0,rat:Number(g.rating)||0}));
    if(legendSort==='rep') rows.sort((a,b)=>b.rep-a.rep||a.i-b.i);
    else if(legendSort==='rat') rows.sort((a,b)=>b.rat-a.rat||a.i-b.i);
    else rows.sort((a,b)=>b.n-a.n||a.i-b.i);
    rows.forEach(({g,i,n,rep,rat})=>{
      const li=el('li'); const sw=el('span','swatch',g.icon); sw.style.background=g.color;
      li.appendChild(sw); li.appendChild(el('span',null,g.name));
      li.appendChild(el('span','ct',n));
      li.appendChild(el('span','ct-rep',rep));
      li.appendChild(el('span','ct-rat',rat));
      ul.appendChild(li);
    });
    ['sortTerr','sortRep','sortRat'].forEach(id=>{ const b=document.getElementById(id); if(b) b.classList.toggle('on', (id==='sortTerr'&&legendSort==='terr')||(id==='sortRep'&&legendSort==='rep')||(id==='sortRat'&&legendSort==='rat')); });

  function terrField(current,onChange){
    const f=el('div','field'); f.appendChild(el('label',null,'Territory Type'));
    const sel=el('select'); const none=el('option',null,'— Empty plot —'); none.value=''; sel.appendChild(none);
    const pool=(state.terrPool&&state.terrPool.length)?state.terrPool:TERRITORIES.map(t=>t.key);
    const used=new Set(); for(const oid in state.nodes){ if(oid===selectedId) continue; const tk=state.nodes[oid].terr; if(tk) used.add(tk); }
    TERRITORIES.filter(t=>pool.includes(t.key)||t.key===current).forEach(t=>{ const inUse=used.has(t.key);
      const o=el('option',null,`${t.name} (${t.card})${t.house?' · '+t.house:''}${inUse?'  · placed':''}`); o.value=t.key;
      if(inUse) o.style.color='#6f7d77';

  const GANG_TYPES = ['Cawdor','Delaque','Escher','Goliath','Orlock','Van Saar','Palanite Enforcers','Badzone Enforcers','Corpse-Grinder Cult','Chaos Cult','Genestealer Cult','Venator','Outcasts','Slave Ogryns','Spyrers','Ash Waste Nomads','Ironhead Squat Prospectors'];

  function isLight(hex){ const h=toHex(hex); const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16); return (0.299*r+0.587*g+0.114*b)>140; }

  function renderArbModal() {
    const body = document.getElementById('arbModalBody');
    const foot = document.getElementById('arbModalFoot');
    body.innerHTML = ''; foot.innerHTML = '';

    if(isArbitrator) {
      document.getElementById('arbModalKicker').textContent = 'Arbitrator';
      document.getElementById('arbModalTitle').textContent = 'Options';
      const who = el('p','','• Logged in as: '+currentUser.username);
      who.style.cssText = 'font-size:13px;color:var(--tox);letter-spacing:.06em;margin-bottom:16px';
      body.appendChild(who);
      const setupBtn2 = el('button','btn','⚙ Campaign Configuration');
      setupBtn2.style.cssText = 'width:100%;margin-bottom:10px;text-align:center';
      setupBtn2.addEventListener('click', () => { arbModal.classList.remove('show'); openSetupModal(); });
      body.appendChild(setupBtn2);
      const delBtn = el('button','btn','⚠ Delete Campaign');
      delBtn.style.cssText = 'width:100%;margin-bottom:10px;text-align:center;border-color:var(--ember);color:var(--ember)';
      delBtn.addEventListener('click', async () => {
        if(!confirm('Permanently delete this campaign? This cannot be undone.')) return;
        const r = await apiFetch('DELETE', `/api/campaigns/${campaignId}`);
        if(r.ok) window.location.replace('/necromunda');
        else alert((r.data&&r.data.error)||'Failed to delete campaign');
      });
      body.appendChild(delBtn);
      const logoutBtn = el('button','btn warn ghost','Logout');
      logoutBtn.style.cssText = 'width:100%;text-align:center';
      logoutBtn.addEventListener('click', async () => {
        await apiFetch('POST', '/api/auth/logout');
        currentUser = null; isArbitrator = false;
         renderArbModal(); render();
      });
      body.appendChild(logoutBtn);
      return;
    }

    // Not arbitrator — show auth form or "wrong user" message
    if(currentUser && campaignMeta && campaignMeta.arbitrator_id !== currentUser.id) {
      document.getElementById('arbModalKicker').textContent = 'Arbitrator';
      document.getElementById('arbModalTitle').textContent = 'Access Denied';
      const msg = el('p','');
      msg.style.cssText = 'font-size:13px;color:var(--muted);letter-spacing:.06em;line-height:1.6';
      msg.innerHTML = 'You are logged in as <span style="color:var(--tox)">'+currentUser.username+'</span> but are not the arbitrator for this campaign. The arbitrator is <span style="color:var(--tox)">'+(campaignMeta.arbitrator||'unknown')+'</span>.';
      body.appendChild(msg);
      const logoutBtn = el('button','btn warn ghost','Logout');
      logoutBtn.style.cssText = 'margin-top:14px;width:100%';
      logoutBtn.addEventListener('click', async () => {
        await apiFetch('POST', '/api/auth/logout');
        currentUser = null; isArbitrator = false;
         renderArbModal();
      });
      body.appendChild(logoutBtn);
      return;
    }

    document.getElementById('arbModalKicker').textContent = 'Arbitrator';
    document.getElementById('arbModalTitle').textContent = 'Login';

    let activeTab = 'login';
    const tabsEl = el('div'); tabsEl.style.cssText = 'display:flex;border-bottom:1px solid var(--edge);margin-bottom:16px';
    const mkTab = (id, label) => {
      const t = el('button', '', label);
      t.dataset.tab = id;
      t.style.cssText = 'background:transparent;border:0;border-bottom:2px solid transparent;padding:8px 14px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;cursor:pointer;margin-bottom:-1px;color:var(--muted);transition:.15s';
      if(id === 'login') { t.style.color = 'var(--tox)'; t.style.borderBottomColor = 'var(--tox)'; }
      return t;
    };
    const tLogin = mkTab('login','Login'), tReg = mkTab('register','Register');
    tabsEl.appendChild(tLogin); tabsEl.appendChild(tReg);

    const errEl = el('div',''); errEl.style.cssText = 'color:#ff8a8a;font-size:12px;min-height:16px;margin-bottom:6px';
    const fUser = el('div','field'); fUser.innerHTML = '<label style="display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Username</label>';
    const iUser = document.createElement('input'); iUser.type='text'; iUser.autocomplete='username'; fUser.appendChild(iUser);
    const fPass = el('div','field'); fPass.innerHTML = '<label style="display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Password</label>';
    const iPass = document.createElement('input'); iPass.type='password'; fPass.appendChild(iPass);

    body.appendChild(tabsEl); body.appendChild(errEl); body.appendChild(fUser); body.appendChild(fPass);

    function switchTab(t) {
      activeTab = t;
      [tLogin,tReg].forEach(b => {
        const on = b.dataset.tab === t;
        b.style.color = on ? 'var(--tox)' : 'var(--muted)';
        b.style.borderBottomColor = on ? 'var(--tox)' : 'transparent';
      });
    }
    tLogin.addEventListener('click', () => switchTab('login'));
    tReg.addEventListener('click', () => switchTab('register'));

    const cancelBtn = el('button','btn','Cancel');
    cancelBtn.addEventListener('click', () => arbModal.classList.remove('show'));
    const submitBtn = el('button','btn primary', 'Login');
    foot.appendChild(cancelBtn); foot.appendChild(submitBtn);

    async function doAuth() {
      errEl.textContent = '';
      const username = iUser.value.trim(), password = iPass.value;
      const path = activeTab === 'login' ? '/api/auth/login' : '/api/auth/register';
      const { ok, data } = await apiFetch('POST', path, { username, password });
      if(!ok) { errEl.textContent = data.error || 'Authentication failed'; return; }
      currentUser = data;
      if(campaignMeta && campaignMeta.arbitrator_id === currentUser.id) {
        isArbitrator = true; 
        arbModal.classList.remove('show'); render();
      } else {
        renderArbModal();
      }
    }
    submitBtn.addEventListener('click', doAuth);
    iPass.addEventListener('keydown', e => { if(e.key === 'Enter') doAuth(); });
  }

  /* ============ MOBILE PAN ============ */
  (function initPan(){
    const stage = document.getElementById('stage');
    const layer = document.getElementById('panLayer');
    let panX = 0, panY = 0;
    let active = false, startX = 0, startY = 0, baseX = 0, baseY = 0;
    let isMobile = false;

    function checkMobile(){
      const was = isMobile;
      isMobile = window.matchMedia('(max-width:1200px)').matches;
      if(was && !isMobile){
        panX = 0; panY = 0;
        layer.style.transform = '';
        document.getElementById('legend').classList.remove('expanded');
      }
    }
    checkMobile();
    window.addEventListener('resize', checkMobile);

    function clampPan(x, y){
      const W = 1600, H = 900;
      const sw = stage.clientWidth, sh = stage.clientHeight;
      const minX = Math.min(0, sw - W), minY = Math.min(0, sh - H);
      return { x: Math.max(minX, Math.min(0, x)), y: Math.max(minY, Math.min(0, y)) };
    }

    function applyPan(x, y){
      const c = clampPan(x, y);
      panX = c.x; panY = c.y;
      layer.style.transform = `translate(${panX}px,${panY}px)`;
    }

    stage.addEventListener('pointerdown', e => {
      if(!isMobile) return;
      // Only pan on the stage background / panLayer itself, not node buttons
      if(e.target.closest('.node')) return;
      active = true;
      startX = e.clientX; startY = e.clientY;
      baseX = panX; baseY = panY;
      stage.setPointerCapture(e.pointerId);
      e.preventDefault();
    }, { passive: false });

    stage.addEventListener('pointermove', e => {
      if(!active) return;
      applyPan(baseX + (e.clientX - startX), baseY + (e.clientY - startY));
    });

    stage.addEventListener('pointerup', () => { active = false; });
    stage.addEventListener('pointercancel', () => { active = false; });

    // On initial mobile load, centre the map
    function centreMap(){
      if(!isMobile) return;
      const sw = stage.clientWidth, sh = stage.clientHeight;
      applyPan((sw - 1600) / 2, (sh - 900) / 2);
    }
    window.addEventListener('resize', centreMap);
    // Run after layout
    setTimeout(centreMap, 0);
  })();

  /* ============ SETUP MODAL WIRING ============ */
  document.getElementById('modalClose').addEventListener('click', () => modal.classList.remove('show'));
  document.getElementById('modalDone').addEventListener('click', () => modal.classList.remove('show'));
  modal.addEventListener('click', e => { if(e.target === modal) modal.classList.remove('show'); });

  /* ============ INIT ============ */
  (async function init(){
    const [meRes, campRes] = await Promise.all([
      apiFetch('GET', '/api/auth/me'),
      apiFetch('GET', `/api/campaigns/${campaignId}`)
    ]);
    if(meRes.ok) currentUser = meRes.data;
    if(campRes.ok) {
      campaignMeta = campRes.data;
      const loaded = campaignMeta.state_json ? JSON.parse(campaignMeta.state_json) : null;
      state = mergeState(loaded);
      // state.campaign comes from state_json (editable in setup); fall back to DB name (= campaign ID initially)
      if(!loaded || !loaded.campaign) state.campaign = campaignMeta.name;
      document.title = state.campaign + ' — Necromunda';
    } else {
      window.location.replace('/necromunda');
      return;
    }
    if(currentUser && campaignMeta && campaignMeta.arbitrator_id === currentUser.id) isArbitrator = true;
    
    buildHive();
    render();
  })();
})();
</script>
